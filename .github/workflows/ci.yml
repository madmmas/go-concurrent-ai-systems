name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.work

      - name: Test all workspace modules
        run: |
          set -euo pipefail
          for mod in $(go list -m -f '{{.Dir}}' all); do
            echo "==> testing $mod"
            (cd "$mod" && go test ./...)
          done

      - name: Race detector (part 03)
        working-directory: arc-1-foundations/part-03-race-conditions
        run: go test -race ./internal/pipeline/...
